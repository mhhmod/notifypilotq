services:
  notifypilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifypilot
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
      SHOPIFY_APP_SCOPES: ${SHOPIFY_APP_SCOPES}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN}
      SHOPIFY_PUBLIC_STORE_URL: ${SHOPIFY_PUBLIC_STORE_URL}
      SHOPIFY_REDIRECT_URI: ${SHOPIFY_REDIRECT_URI}
      SHOPIFY_APP_PROXY_PATH: ${SHOPIFY_APP_PROXY_PATH}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION}
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${SHOPIFY_ADMIN_ACCESS_TOKEN}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NOTIFYPILOT_INTEGRATION_MODE: ${NOTIFYPILOT_INTEGRATION_MODE}
      LIVE_SENDING_ENABLED: ${LIVE_SENDING_ENABLED}
      OWNER_TEST_MODE: ${OWNER_TEST_MODE}
      MAX_SENDS_PER_HOUR: ${MAX_SENDS_PER_HOUR}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      N8N_BASE_URL: ${N8N_BASE_URL}
      N8N_CAMPAIGN_SENDER_WEBHOOK_PATH: ${N8N_CAMPAIGN_SENDER_WEBHOOK_PATH}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
